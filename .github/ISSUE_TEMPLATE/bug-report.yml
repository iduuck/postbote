name: Bug Report
description: Report a problem with Postbote
labels: ["bug"]
body:
  - type: input
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      placeholder: "@postbote/adapter-resend"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.1.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code or steps to reproduce
      render: typescript
  - type: input
    id: node-version
    attributes:
      label: Node Version
      placeholder: "20.19 / 22"
